# Nano Banana Model Configuration
# Author: Chandan Kumar
# Email: chandan@bit.edu.cn

[model]
version = "1.0.0"
threshold = 0.5
nano_mode = true

[features]
enabled_features = ["length", "diameter", "color", "weight", "firmness", "temperature"]
max_features = 6
normalize = true

[classification]
unripe_threshold = 0.3
ripe_threshold = 0.7
confidence_min = 0.5

[logging]
level = "INFO"
file = "logs/app.log"
max_bytes = 10485760
backup_count = 5

[output]
format = "json"
save_results = true
results_dir = "output/"
