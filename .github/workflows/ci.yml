name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install core deps only (skip sphinx/docs which are not needed in CI)
        pip install numpy scipy scikit-learn matplotlib pandas
        pip install pytest pytest-cov flake8
        if [ -f setup.py ]; then pip install -e . --no-deps; fi

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-line-length=127 --statistics
      continue-on-error: true

    - name: Run tests
      run: |
        # Exit code 5 = no tests collected — treat as success
        pytest -v || EXIT=$?; [ "${EXIT:-0}" = "5" ] && echo "No tests found — OK" || exit ${EXIT:-0}
